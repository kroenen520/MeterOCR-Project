name: Build MeterOCR EXE

on:
  # 手动触发（在GitHub Actions页面点击Run workflow）
  workflow_dispatch:
  
  # 推送标签时自动构建（如 git tag v1.0.0 && git push --tags）
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 安装Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    # 3. 安装依赖
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    
    # 4. 预下载OCR模型（避免每次运行都下载）
    - name: Pre-download OCR models
      run: |
        python -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch', show_log=True); print('Models downloaded')"
    
    # 5. 打包成EXE
    - name: Build EXE
      run: pyinstaller meter_ocr.spec --clean
    
    # 6. 创建分发包
    - name: Create release package
      run: |
        mkdir release
        copy dist\MeterOCR.exe release\
        echo 电表OCR批量识别工具 v1.0.0 > release\使用说明.txt
        echo. >> release\使用说明.txt
        echo 【使用方法】 >> release\使用说明.txt
        echo 1. 将EXE放到任意文件夹 >> release\使用说明.txt
        echo 2. 在EXE同级目录创建子文件夹，放入电表照片 >> release\使用说明.txt
        echo 3. 双击运行 MeterOCR.exe >> release\使用说明.txt
        echo 4. 自动生成日期时间命名的Excel表格 >> release\使用说明.txt
        echo. >> release\使用说明.txt
        echo 【输出格式】 >> release\使用说明.txt
        echo YYYYMMDDHHMMSS.xlsx（如 20260104152119.xlsx） >> release\使用说明.txt
        echo. >> release\使用说明.txt
        echo 【系统要求】 >> release\使用说明.txt
        echo Windows 10/11, 4GB+ 内存 >> release\使用说明.txt
    
    # 7. 上传构建产物（可在Actions页面下载）
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MeterOCR-EXE
        path: release/
        retention-days: 30
    
    # 8. 如果是标签推送，自动创建GitHub Release
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
